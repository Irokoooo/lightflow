<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base Script</title>
    <style>
      #boot-status {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 12px;
        margin: 12px;
        border-radius: 10px;
        background: #fffbe6;
        border: 1px solid #ffe58f;
        color: #614700;
        font-size: 13px;
        line-height: 1.6;
      }
      #boot-status[data-level="error"] {
        background: #fff2f0;
        border-color: #ffccc7;
        color: #a8071a;
      }
      #boot-status[data-level="ok"] {
        background: #f6ffed;
        border-color: #b7eb8f;
        color: #237804;
      }
      #boot-status[hidden] {
        display: none !important;
      }
    </style>
    <script>
      window.__LIGHTFLOW_BOOT__ = {
        setStatus(message, level) {
          var el = document.getElementById('boot-status');
          if (!el) return;
          el.textContent = message;
          if (level) el.setAttribute('data-level', level);
        },
        hide() {
          var el = document.getElementById('boot-status');
          if (!el) return;
          el.hidden = true;
        }
      };

      window.addEventListener('error', function (event) {
        var msg = event && event.message ? event.message : '未知脚本错误';
        window.__LIGHTFLOW_BOOT__.setStatus('LightFlow 启动脚本报错: ' + msg, 'error');
      });

      window.addEventListener('unhandledrejection', function (event) {
        var reason = event && event.reason ? (event.reason.message || String(event.reason)) : '未知 Promise 错误';
        window.__LIGHTFLOW_BOOT__.setStatus('LightFlow Promise 异常: ' + reason, 'error');
      });
    </script>
  </head>
  <body>
    <div id="boot-status">LightFlow 启动探针：HTML 已加载，等待 JS 执行...</div>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
